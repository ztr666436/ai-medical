server:
  port: 8080

spring:
  application:
    name: ai-medical-care-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates: Path=/api/auth/**
        - id: health-data-service
          uri: http://localhost:8083
          predicates: Path=/api/health/**
        - id: goal-service
          uri: http://localhost:8084
          predicates: Path=/api/goal/**
        - id: ai-agent-service
          uri: http://localhost:8085
          predicates: Path=/api/agent/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
  data:
    redis:
      host: 127.0.0.1
      port: 6379

logging:
  level:
    com.medical.gateway: debug
